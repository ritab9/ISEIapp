/*
==========================================================================
ISEI Edit Protection Framework

Required:

1. Hidden field:  id="form_version"

2. Lock message: id="lock-message"

3. Reload notification:
    formUpdatedBox
    formUpdatedMessage
    reloadPageButton

4. Configuration:

window.divButtonMapping = [
    {
        formId: "...",
        divs: [...],
        buttons: [...]
    }
];


window.divsButtonMapping = [
        { divs: ["div1", "div2"], buttons: ["save-button1", "save-button2"], formId: "{ { formId|escapejs  }}" } // Both forms trigger both buttons
    ];
-->
<script>
    document.addEventListener("DOMContentLoaded", function () {

    // =========================================================================
    // ISEI Edit Protection Framework
    // Features:
    // • Edit locking
    // • Same-user session detection
    // • Take over editing
    // • Version conflict detection
    // • Automatic polling
    // • Unsaved changes warning
    // • Automatic lock release
    // =========================================================================
        
        
// Configuration
        const CONFIG = {POLLING_INTERVAL: 15000, LOCK_TIMEOUT_MINUTES: 60,};
     
// Current Editing Session
        let editorId = sessionStorage.getItem("editorId");
        
        if (!editorId) {
            editorId = crypto.randomUUID();
            sessionStorage.setItem("editorId", editorId);
        }
        
        const session = {
            editorId: editorId,
            currentFormId: null,
            dirty: false,
            saving: false,
            reloading:false,
        };
        
 // =========================================================================
// Utilities
// =========================================================================
        
        function getCookie(name) {
            let cookieValue = null;
    
            if (document.cookie && document.cookie !== "") {
                const cookies = document.cookie.split(";");
    
                for (let cookie of cookies) {
                    cookie = cookie.trim();
    
                    if (cookie.startsWith(name + "=")) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
    
            return cookieValue;
        }
        
// ============================================================================
// UI Helpers
// ============================================================================
        
        function removeMessages() {
                document.querySelectorAll(".messages").forEach(message => message.remove());
            }
    
        function toggleButtons(buttons, show) {
            buttons.forEach(button => {
                button.style.display = show ? "inline-block" : "none";
            });
        }
        
        function showReloadModal(username){
            
                const message = document.getElementById("formUpdatedMessage");
                const box = document.getElementById("formUpdatedBox");
                
                if (!message || !box) {
                    return;
                }
                message.textContent = `${username} has finished editing this form.`;
                box.classList.remove("d-none");
                
                document
                    .getElementById("formUpdatedBox")
                    .classList.remove("d-none");
            }
        
        function setInputsEnabled(divs, enabled) {
                    divs.forEach(div => {
                        div.querySelectorAll("input, textarea, select")
                            .forEach(field => {
                                field.disabled = !enabled;
                            });
                    });
                }
        
        function showLockMessage(message) {
            const lockMessageDiv = document.querySelector("#lock-message");
            if (!lockMessageDiv) return;
            lockMessageDiv.innerHTML = `${message}<hr>`;
            lockMessageDiv.style.display = "block";
        }
        
        function hideLockMessage() {
            const lockMessageDiv = document.querySelector("#lock-message");
            if (lockMessageDiv) {
                lockMessageDiv.style.display = "none";
            }
        }
        
        function setEditingEnabled(divs, saveButtons, enabled) {
            setInputsEnabled(divs, enabled);
            toggleButtons(saveButtons, enabled);
            if (enabled) {
                hideLockMessage();
            }
        }
        
// =========================================================================
// Edit Protection Initialization
// =========================================================================
    
        function initializeEditProtection(divIds, buttonIds, formId) {
    
            let divs = divIds.map(id => document.querySelector(`#${id}`)).filter(div => div !== null);
            let saveButtons = buttonIds.map(id => document.querySelector(`#${id}`)).filter(btn => btn !== null);
    
            const versionField = document.getElementById("form_version");
            if (!versionField) {
                    console.error("ISEI Edit Protection: #form_version not found.");
                    return;
                }
            
            const state = {
                    lockAcquired: false,
                    checkingLock: false,
                    pollTimer: null,
                    originalVersion: Number(versionField.value),
                };
    
            if (divs.length === 0 || saveButtons.length === 0) return;
    
            toggleButtons(saveButtons, false);
    
            divs.forEach(div => {
                div.addEventListener("input", handleChange);
                div.addEventListener("change", handleChange);
                div.addEventListener("click", handleChange);
            });
    
            function handleChange() {
                
                session.dirty= true;
                
                removeMessages();
    
                if (!state.checkingLock && !state.lockAcquired) {
                    state.checkingLock = true;
                    checkFormLock(formId);
                }
            }
    
            function startPolling() {
                if (state.pollTimer) return;
                state.pollTimer = setInterval(checkIfUnlocked, CONFIG.POLLING_INTERVAL);
            }
            
            function stopPolling() {
                if (state.pollTimer) {
                    clearInterval(state.pollTimer);
                    state.pollTimer = null;
                }
            }
            
            function checkIfUnlocked() {
                fetch(`/check-lock/${formId}/`)
                    .then(response => response.json())
                    .then(data => {
            
                        if (data.locked) {
                            return;
                        }
            
                        stopPolling();
            
                        if (data.version != state.originalVersion) {
                            showReloadModal(data.last_modified_by);
                        } else {
                            setEditingEnabled(divs, saveButtons, true);
                        }
                    })
                    .catch(error => {
                        console.error("Error checking lock:", error);
                    });
            }
            
            function checkFormLock(formId) {
    
                fetch(`/check-lock/${formId}/`)
                    .then(response => response.json())
                    .then(data => {
    
                        state.checkingLock = false;
                        
                        if (data.locked) {
    
                            let message =
                                `This form is currently being edited by ${data.username}. ` +
                                `You cannot edit it until the other user saves his/her work.`;
    
                            alert(message);
    
                            showLockMessage(message);

                            setEditingEnabled(divs, saveButtons, false);
                        
                            startPolling();
                            
                        } else {
                            setEditingEnabled(divs, saveButtons, true);
                            acquireLock(formId);
                        }
    
                    })
                    .catch(error => {
                        state.checkingLock = false;
                        console.error("Error checking lock:", error);
                    });
            }
    
            function acquireLock(formId) {
                
                fetch(`/acquire-lock/${formId}/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken"),
                    },
                    body: JSON.stringify({
                        version: versionField.value,
                        editor_id: session.editorId
                    })
                })
    
                .then(response => response.json())
    
                .then(data => {
    
                    if (data.status === "stale") {
    
                        alert(`This form has been modified by ${data.username} since you opened it.\n\n` + 
                            `To prevent conflicting changes, the page will now reload so you can review the latest information.\n\n` +
                            `Depending on your browser, you may be asked to confirm that the page should be reloaded or that the form should be resubmitted.`
                                );
                        session.reloading = true;
                        sessionStorage.setItem("scrollPosition", window.scrollY);
                        window.location.reload();
                        return;
                    }
    
                    if (data.status === "locked_by_other") {
    
                        let message;

                        if (data.same_user) {
                            if (confirm(
                                "You already have this form open for editing in another tab, browser, or device.\n\n" +
                                "Click OK to transfer editing to this session.\n\n" +
                                "Warning:\n" +
                                "• Unsaved changes in the other session may be lost if you save here first.\n" +
                                "• If the other session is saved before this one, this session will no longer be able to save its changes.\n\n" +
                                "Click Cancel to continue editing in the other session."
                            )) {
                                takeOverLock(formId);
                            }
                            
                            return;
                             } else {
                            message =
                                `This form is currently being edited by ${data.username}. ` +
                                "You cannot edit it until the other user saves his/her work.";
                        }
    
                        alert(message);
                        showLockMessage(message);
                        setEditingEnabled(divs, saveButtons, false);
                        
                        return;
                    }
    
                    if (data.status === "locked") {
                        stopPolling();
                        state.lockAcquired = true;
                        session.currentFormId = formId;
                        setEditingEnabled(divs, saveButtons, true);
                        // If acquireLock() was triggered by an edit, that edit already made the form dirty.
                        session.dirty = true;
                    }
                })
    
                .catch(error => console.error("Error acquiring lock:", error));
            }
    
            function releaseLock(formId) {
    
                if (!state.lockAcquired) return;
    
                fetch(`/release-lock/${formId}/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken"),
                    },
                    body: JSON.stringify({
                        editor_id: session.editorId
                    })
                })
    
                .then(response => response.json())
    
                .then(data => {
    
                    if (data.status === "released") {
    
                        state.lockAcquired = false;
                        session.currentFormId = null;
                        setEditingEnabled(divs, saveButtons, false);
                        checkFormLock(formId);
                    }
                })
    
                .catch(error => console.error("Error releasing lock:", error));
            }
            
            function takeOverLock(formId) {
                
                fetch(`/take-over-lock/${formId}/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken"),
                    },
                    body: JSON.stringify({
                        editor_id: session.editorId
                    })
                })
            
                .then(response => response.json())
                .then(data => {
                    if (data.status === "taken_over") {
                        state.lockAcquired = true;
                        session.currentFormId = formId;
                        session.dirty = true;
                        setEditingEnabled(divs, saveButtons, true);
                    }
                });
            }
            
            
            const form = saveButtons[0].closest("form");
            
            if (form) {
                form.addEventListener("submit", function () {
                    session.saving = true;
                    session.dirty = false;
                    releaseLock(formId);
                });
            }
    
        }
        
        

// =========================================================================
// Framework Initialization
// =========================================================================
        
        if (window.divButtonMapping && window.divButtonMapping.length > 0) {
    
            window.divButtonMapping.forEach(mapping => {
                initializeEditProtection(
                    mapping.divs,
                    mapping.buttons,
                    mapping.formId
                );
            });
    
        } else {
    
            console.warn("divButtonMapping is not set or empty. Locking setup may not work.");
    
        }
        
// =========================================================================
// Global Event Handlers
// =========================================================================  
        document
            const reloadButton = document.getElementById("reloadPageButton");
            if(reloadButton) {
                reloadButton.addEventListener("click", function () {
                session.reloading = true;
                sessionStorage.setItem("scrollPosition", window.scrollY);
                window.location.reload();
        
            });
                }
    
        window.addEventListener("beforeunload", function (event) {
            if (session.dirty && !session.saving && !session.reloading) {
                    event.preventDefault();
                    event.returnValue = "";
                }
            
            if (session.currentFormId) {
                const data = new Blob(
                    [JSON.stringify({ editor_id: session.editorId })],
                    { type: "application/json" }
                );
                navigator.sendBeacon(`/release-lock/${session.currentFormId}/`, data);
            }
            
        });
        
    });
</script>

/ =============================================================================
// ISEI EDIT PROTECTION FRAMEWORK
// =============================================================================
//
// PURPOSE
// -------
// Prevents multiple users (or multiple sessions of the same user) from editing
// the same form simultaneously.
//
// FEATURES
// --------
// ✓ Automatic edit locking
// ✓ Same-user multi-tab/device detection
// ✓ Lock takeover
// ✓ Automatic lock release
// ✓ Polling while another user is editing
// ✓ Version conflict detection
// ✓ Unsaved changes warning
// ✓ Restore scroll position after reload
//
// =============================================================================
// REQUIREMENTS
// =============================================================================
//
// 1. Hidden Version Field
// -----------------------
//
// Every protected form must contain:
//
//     <input type="hidden"
//            id="form_version"
//            value="{{ form.version }}">
//
//
// =============================================================================
// 2. Editable Containers
// =============================================================================
//
// Every editable area must have an id.
//
// Example:
//
//     <div id="standard-form">
//         ...
//     </div>
//
//
// =============================================================================
// 3. Save Buttons
// =============================================================================
//
// Every save button must have an id.
//
// Example:
//
//     <button id="floating-save-btn" type="submit">
//         Save Changes
//     </button>
//
//     <button id="bottom-save-btn" type="submit">
//         Save Changes
//     </button>
//
//
// =============================================================================
// 4. Lock Message Area
// =============================================================================
//
// The page must contain:
//
//     <div id="lock-message"></div>
//
// This is used to display:
//
//     "This form is currently being edited by ..."
//
//
// =============================================================================
// 5. Reload Notification
// =============================================================================
//
// The page should contain:
//
//     formUpdatedBox
//     formUpdatedMessage
//     reloadPageButton
//
// These are shown when another user has saved changes while this page
// was open.
//
//
//
// =============================================================================
// 6. JavaScript Configuration
// =============================================================================
//
// Before including this file define:
//
// window.divButtonMapping = [
//     {
//         formId: "{{ formId|escapejs }}",
//         divs: [
//             "standard-form"
//         ],
//         buttons: [
//             "floating-save-btn",
//             "bottom-save-btn"
//         ]
//     }
// ];
//
// Multiple editable sections may be configured.
//
// Example:
//
// window.divButtonMapping = [
//     {
//         formId: "...",
//         divs: ["div1"],
//         buttons: ["save1"]
//     },
//     {
//         formId: "...",
//         divs: ["div2","div3"],
//         buttons: ["save2","save3"]
//     }
// ];
//
//
// =============================================================================
// 7. Required Django Endpoints
// =============================================================================
//
// GET
//
//     /check-lock/<form_id>/
//
// Returns:
//
// {
//     locked: true/false,
//     username: "...",
//     version: 12,
//     last_modified_by: "..."
// }
//
//
//
// POST
//
//     /acquire-lock/<form_id>/
//
// Returns one of:
//
//     locked
//     locked_by_other
//     stale
//
//
//
// POST
//
//     /take-over-lock/<form_id>/
//
// Transfers editing from another session of the SAME USER.
//
//
//
// POST
//
//     /release-lock/<form_id>/
//
// Releases the editing lock.
//
//
//
// =============================================================================
// 8. Database Requirements
// =============================================================================
//
// CurrentlyEditing model:
//
//     form_id
//     user
//     editor_id
//     last_active
//
//
//
// =============================================================================
// 9. What Happens
// =============================================================================
//
// User edits page
//        │
//        ▼
// Check for existing lock
//        │
//        ├──────── locked by another user
//        │             │
//        │             ▼
//        │      Disable editing
//        │      Poll every 15 seconds
//        │
//        └──────── available
//                      │
//                      ▼
//              Acquire lock
//                      │
//                      ▼
//              Enable Save buttons
//                      │
//                      ▼
//                 User saves
//                      │
//                      ▼
//               Release lock
//
//
//
// =============================================================================
// 10. Testing Checklist
// =============================================================================
//
// □ User can edit normally
//
// □ Save buttons appear after first edit
//
// □ Closing tab releases lock
//
// □ Refresh releases lock
//
// □ Browser Back button warns about unsaved changes
//
// □ User cannot edit while another user is editing
//
// □ Polling re-enables editing after other user saves
//
// □ Same user opening second tab gets Take Over dialog
//
// □ Version conflict forces reload
//
// □ Scroll position restored after reload
//
// □ Save does NOT trigger unsaved changes warning
//
// □ Framework works with multiple editable divs
//
//
//
// =============================================================================
// Version
// =============================================================================
//
// ISEI Edit Protection Framework
//
// Author: Rita B.
// Version: 1.0
//
// =============================================================================
-->
